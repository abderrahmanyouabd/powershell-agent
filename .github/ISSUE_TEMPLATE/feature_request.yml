name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: textarea
    id: description
    attributes:
      label: What feature would you like?
      description: Describe the feature you want
      placeholder: I would like...
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why do you need this?
      description: What problem does this solve? (optional)
      placeholder: This would help me...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional info
      description: Mockups, examples, or any other details
    validations:
      required: false
